services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowstate
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      target: runtime
    # command: uv run uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build:
      context: .
      target: runtime
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: